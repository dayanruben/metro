name: 'Setup Gradle'
description: 'Configures JDK, Gradle wrapper cache, setup-gradle, and optional Konan cache'

inputs:
  encryption-key:
    description: 'Gradle cache encryption key'
    required: true
  cache-read-only:
    description: 'Whether gradle cache is read-only'
    required: false
    default: 'false'
  konan:
    description: 'Whether to set up konan cache'
    required: false
    default: 'false'
  kotlin-compiler-version:
    description: |
      Kotlin compiler version this run targets (e.g. matrix.kotlin-compiler from
      version-aliases.txt). Used directly as the per-version segment of the konan klib cache key
      so each Kotlin version owns its own `kotlin-native-prebuilt-*` distribution. Leave empty
      when the caller uses the default Kotlin from libs.versions.toml.
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Configure JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version-file: .github/workflows/.java-version

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-read-only: ${{ inputs.cache-read-only }}
        gradle-home-cache-strict-match: true
        cache-encryption-key: ${{ inputs.encryption-key }}
        gradle-home-cache-excludes: |
          caches/jars-9
          caches/transforms-3
          wrapper/dists

    - name: Cache Gradle wrapper
      uses: actions/cache@v6
      with:
        path: ~/.gradle/wrapper/dists
        key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}

    # ~/.konan/ has two top-level layers with different cache lifetimes:
    #
    #  1. `dependencies/` — toolchain bits (LLVM, sysroots, gcc cross-compile dirs). Versioned by
    #     the dep itself (e.g. `x86_64-unknown-linux-gnu-gcc-8.3.0-glibc-2.19-...`), additive
    #     across Kotlin versions, large. Cached once per OS with a static key — bump the `-v1`
    #     suffix if K/N ever restructures this directory in a backward-incompatible way.
    #
    #  2. `kotlin-native-prebuilt-<os>-<arch>-<version>/` — the per-Kotlin-version compiler
    #     distribution + bundled klibs. Cached with the explicit `kotlin-compiler-version` input as
    #     the discriminator, so each matrix entry owns its own prebuilt.
    #
    # `~/.konan/cache/` (K/N's incremental compile cache) is also kept on the per-version key —
    # its contents depend on the Kotlin version's compiler output. It may not exist on cold runs;
    # actions/cache silently ignores missing paths.
    - name: Cache konan toolchain (shared)
      if: inputs.konan == 'true'
      uses: actions/cache@v6
      with:
        path: ~/.konan/dependencies
        key: ${{ runner.os }}-konan-deps-v1

    - name: Cache konan klibs (per Kotlin version)
      if: inputs.konan == 'true'
      uses: actions/cache@v6
      with:
        path: |
          ~/.konan/cache
          ~/.konan/kotlin-native-prebuilt-linux*
          ~/.konan/kotlin-native-prebuilt-macos*
          ~/.konan/kotlin-native-prebuilt-mingw*
          ~/.konan/kotlin-native-prebuilt-windows*
        key: ${{ runner.os }}-konan-klibs-${{ inputs.kotlin-compiler-version || 'default' }}
